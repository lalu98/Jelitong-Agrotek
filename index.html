<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jelitong Agrotek</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --earth: #3d2b1f;
    --soil: #6b4226;
    --leaf: #2d6a2d;
    --leaf-light: #4a9e4a;
    --sprout: #7bc67b;
    --sun: #e8a735;
    --cream: #f9f3e8;
    --parchment: #f0e6d0;
    --mist: #e8f4e8;
    --shadow: rgba(61,43,31,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(45,106,45,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(232,167,53,0.08) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%232d6a2d' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--earth) 0%, var(--leaf) 60%, var(--leaf-light) 100%);
    padding: 0;
    position: relative;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  }

  .header::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -10%;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(123,198,123,0.2) 0%, transparent 70%);
    border-radius: 50%;
  }

  .header::after {
    content: '🌾';
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 64px;
    opacity: 0.15;
  }

  .header-inner {
    max-width: 780px;
    margin: 0 auto;
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
    z-index: 1;
  }

  .logo-circle {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, var(--sun), #f0c060);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    box-shadow: 0 4px 12px rgba(232,167,53,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
    flex-shrink: 0;
    animation: pulse-logo 3s ease-in-out infinite;
  }

  @keyframes pulse-logo {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .header-text h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .header-text p {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    font-weight: 300;
    margin-top: 2px;
    letter-spacing: 0.3px;
  }

  .status-dot {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.9);
    margin-top: 4px;
    width: fit-content;
  }

  .status-dot::before {
    content: '';
    width: 6px;
    height: 6px;
    background: var(--sprout);
    border-radius: 50%;
    box-shadow: 0 0 6px var(--sprout);
    animation: blink 1.5s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* CHAT AREA */
  .chat-wrapper {
    flex: 1;
    max-width: 780px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    padding: 0 16px;
  }

  .chat-messages {
    flex: 1;
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    min-height: 0;
    overflow-y: auto;
    max-height: calc(100vh - 260px);
  }

  /* WELCOME CARD */
  .welcome-card {
    background: linear-gradient(135deg, #fff 0%, var(--mist) 100%);
    border: 1.5px solid rgba(45,106,45,0.15);
    border-radius: 20px;
    padding: 24px;
    text-align: center;
    box-shadow: 0 4px 20px var(--shadow);
    animation: slideUp 0.5s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .welcome-emoji {
    font-size: 48px;
    margin-bottom: 12px;
    display: block;
    animation: wave 2s ease-in-out infinite;
  }

  @keyframes wave {
    0%, 100% { transform: rotate(0deg); }
    25% { transform: rotate(10deg); }
    75% { transform: rotate(-5deg); }
  }

  .welcome-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    color: var(--earth);
    margin-bottom: 8px;
  }

  .welcome-card p {
    font-size: 14px;
    color: var(--soil);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  .quick-btns {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .quick-btn {
    background: white;
    border: 1.5px solid rgba(45,106,45,0.25);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 12.5px;
    color: var(--leaf);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .quick-btn:hover {
    background: var(--leaf);
    color: white;
    border-color: var(--leaf);
    transform: translateY(-1px);
    box-shadow: 0 4px 10px rgba(45,106,45,0.25);
  }

  /* MESSAGES */
  .msg {
    display: flex;
    gap: 10px;
    animation: msgIn 0.3s ease;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px var(--shadow);
  }

  .msg.bot .msg-avatar {
    background: linear-gradient(135deg, var(--leaf), var(--leaf-light));
  }

  .msg.user .msg-avatar {
    background: linear-gradient(135deg, var(--sun), #f0c060);
  }

  .msg-bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 18px;
    line-height: 1.6;
    font-size: 14px;
  }

  .msg.bot .msg-bubble {
    background: white;
    border: 1px solid rgba(45,106,45,0.1);
    border-bottom-left-radius: 4px;
    color: var(--earth);
    box-shadow: 0 2px 12px var(--shadow);
  }

  .msg.user .msg-bubble {
    background: linear-gradient(135deg, var(--leaf), var(--leaf-light));
    border-bottom-right-radius: 4px;
    color: white;
    box-shadow: 0 2px 12px rgba(45,106,45,0.3);
  }

  .msg-bubble strong { font-weight: 600; }

  .msg-bubble ul, .msg-bubble ol {
    padding-left: 18px;
    margin: 6px 0;
  }

  .msg-bubble li { margin: 3px 0; }

  .msg-bubble h3 {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: var(--leaf);
    margin: 10px 0 4px;
    border-bottom: 1px solid rgba(45,106,45,0.15);
    padding-bottom: 4px;
  }

  .msg.user .msg-bubble h3 { color: rgba(255,255,255,0.9); border-color: rgba(255,255,255,0.2); }

  .today-action {
    background: linear-gradient(135deg, var(--sun), #f0c060);
    border-radius: 12px;
    padding: 10px 14px;
    margin-top: 10px;
    font-size: 13px;
    font-weight: 600;
    color: var(--earth);
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }

  /* TYPING */
  .typing-indicator {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 14px 16px;
  }

  .typing-indicator span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--sprout);
    animation: bounce 1.2s ease infinite;
  }

  .typing-indicator span:nth-child(2) { animation-delay: 0.15s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-8px); }
  }

  /* INPUT AREA */
  .input-area {
    background: white;
    border-top: 1.5px solid rgba(45,106,45,0.1);
    padding: 16px;
    box-shadow: 0 -4px 20px var(--shadow);
  }

  .input-inner {
    max-width: 780px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-box {
    flex: 1;
    position: relative;
  }

  textarea {
    width: 100%;
    border: 1.5px solid rgba(45,106,45,0.2);
    border-radius: 16px;
    padding: 12px 16px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    resize: none;
    outline: none;
    color: var(--earth);
    background: var(--cream);
    transition: border-color 0.2s, box-shadow 0.2s;
    line-height: 1.5;
    max-height: 120px;
    min-height: 48px;
  }

  textarea:focus {
    border-color: var(--leaf);
    box-shadow: 0 0 0 3px rgba(45,106,45,0.1);
    background: white;
  }

  textarea::placeholder { color: #aaa; }

  .send-btn {
    width: 48px;
    height: 48px;
    background: linear-gradient(135deg, var(--leaf), var(--leaf-light));
    border: none;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(45,106,45,0.35);
    transition: all 0.2s ease;
    color: white;
    font-size: 20px;
  }

  .send-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 6px 16px rgba(45,106,45,0.45);
  }

  .send-btn:active { transform: scale(0.96); }
  .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .hint {
    font-size: 11px;
    color: #aaa;
    text-align: center;
    margin-top: 8px;
  }

  /* Scrollbar */
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: rgba(45,106,45,0.2); border-radius: 4px; }

  /* Responsive */
  @media (max-width: 500px) {
    .header-text h1 { font-size: 18px; }
    .msg-bubble { max-width: 85%; font-size: 13px; }
    .quick-btn { font-size: 11.5px; padding: 6px 12px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="logo-circle">🌱</div>
    <div class="header-text">
      <h1>Jelitong Agrotek</h1>
      <p>Asisten Digital Pertanian · Lombok & NTB</p>
      <div class="status-dot">Siap membantu petani</div>
    </div>
  </div>
</div>

<div class="chat-wrapper">
  <div class="chat-messages" id="chatMessages">
    <div class="welcome-card">
      <span class="welcome-emoji">👋</span>
      <h2>Selamat Datang, Pak / Bu Petani!</h2>
      <p>Saya <strong>Jelitong Agrotek</strong> — ahli pertanian digital Anda.<br>
      Saya siap bantu dari tanam sampai panen, gratis dan mudah!</p>
      <div class="quick-btns">
        <button class="quick-btn" onclick="sendQuick('Saya ingin menanam cabai di lahan 500 m2')">🌶️ Tanam Cabai</button>
        <button class="quick-btn" onclick="sendQuick('Bagaimana cara menanam padi yang benar?')">🌾 Tanam Padi</button>
        <button class="quick-btn" onclick="sendQuick('Daun tanaman saya menguning, kenapa?')">🍃 Daun Kuning</button>
        <button class="quick-btn" onclick="sendQuick('Saya ingin menanam bawang merah di lahan 1000 m2')">🧅 Bawang Merah</button>
        <button class="quick-btn" onclick="sendQuick('Tanaman saya kena hama, bagaimana cara mengatasinya?')">🐛 Hama Tanaman</button>
        <button class="quick-btn" onclick="sendQuick('Kapan waktu terbaik menanam jagung di NTB?')">🌽 Tanam Jagung</button>
      </div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-inner">
    <div class="input-box">
      <textarea
        id="userInput"
        placeholder="Tanya apa saja soal pertanian... (misal: lahan saya 500m², mau tanam tomat)"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Kirim">➤</button>
  </div>
  <div class="hint">Tekan Enter untuk kirim · Shift+Enter untuk baris baru</div>
</div>

<script>
const SYSTEM_PROMPT = `Anda adalah Jelitong Agrotek — seorang ahli agronomi dan penyuluh pertanian dengan pengalaman lebih dari 20 tahun membantu petani di wilayah Lombok dan Nusa Tenggara Barat (NTB).

Tugas Anda adalah menjadi asisten digital bagi petani pemula yang tidak memiliki pengetahuan pertanian sama sekali.

Tujuan utama Anda adalah membantu petani agar berhasil:
- memilih tanaman yang tepat
- mengolah lahan dengan benar
- menanam dengan cara yang benar
- merawat tanaman sampai panen
- mengatasi hama dan penyakit
- mengetahui kapan panen

Gunakan bahasa yang sangat sederhana dan praktis. Jangan memberikan teori panjang. Jangan menggunakan istilah ilmiah yang sulit.

Jawaban harus:
- singkat dan jelas
- berbentuk langkah-langkah praktis
- bisa langsung dilakukan di lapangan
- menggunakan emoji yang relevan agar mudah dibaca

Fokus tanaman yang sering ditanam di NTB: Padi, Jagung, Cabai, Tomat, Bawang merah, Kangkung, Terong, Semangka, Kacang tanah, Kacang panjang.

Jika petani ingin menanam tanaman, berikan informasi berikut:
1. Kondisi tanah yang cocok
2. pH tanah yang ideal
3. Cara mengolah lahan
4. Cara membuat bedengan (jika perlu)
5. Jarak tanam
6. Umur bibit sebelum ditanam
7. Kebutuhan pupuk dasar
8. Jenis pupuk yang digunakan
9. Jadwal pemupukan dari HST 0 sampai panen
10. Jadwal penyemprotan hama
11. Waktu mulai panen

Jika petani menyebutkan luas lahan, WAJIB hitung kebutuhan pupuk berdasarkan luas lahan tersebut.

Jika petani memiliki masalah pada tanaman:
1. Identifikasi kemungkinan penyebab
2. Jelaskan penyebab secara sederhana
3. Berikan solusi yang murah dan mudah dilakukan
4. Jelaskan cara pengobatan langkah demi langkah

Setiap jawaban HARUS memiliki struktur:
1. Penjelasan singkat
2. Langkah yang harus dilakukan (dengan nomor atau bullet)
3. Jadwal perawatan (jika relevan)
4. Selalu akhiri dengan bagian: "✅ Yang Harus Anda Lakukan Hari Ini:" berisi 2-3 tindakan konkret yang bisa langsung dikerjakan petani hari ini

Selalu berikan solusi yang murah, mudah ditemukan di toko pertanian, dan realistis untuk petani kecil di NTB.

Format output menggunakan teks biasa dengan emoji, bukan HTML atau markdown yang kompleks. Gunakan baris baru untuk memisahkan bagian.`;

let conversationHistory = [];
let isLoading = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendQuick(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function addMessage(role, text) {
  const container = document.getElementById('chatMessages');

  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'bot' ? '🌱' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  // Format the text nicely
  const formatted = formatMessage(text);
  bubble.innerHTML = formatted;

  div.appendChild(avatar);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function formatMessage(text) {
  // Convert line breaks
  let html = text.replace(/\n/g, '<br>');

  // Bold **text**
  html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

  // Detect "Yang Harus Anda Lakukan Hari Ini" section
  html = html.replace(
    /(✅[^<]*Hari Ini[^<]*:?<br>)([\s\S]*?)(?=<br><br>|$)/,
    (match, title, content) => {
      return `<div class="today-action">⚡ ${title}${content}</div>`;
    }
  );

  return html;
}

<script>
// Tempelkan kunci panjang dari Google AI Studio di antara tanda kutip di bawah ini
const API_KEY = "AIzaSyChNtgJ8fDzH_WGH1m1vCHGayyPys9RUjs"

const SYSTEM_PROMPT = `Anda adalah Jelitong Agrotek — ahli pertanian di NTB. 
Gunakan bahasa sederhana dan berikan langkah praktis untuk petani.`;

let isLoading = false;

function sendQuick(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function addMessage(role, text) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'bot' ? '🌱' : '👤';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  div.appendChild(avatar);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  addMessage('user', text);
  isLoading = true;
  
  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: SYSTEM_PROMPT + "\n\nPertanyaan petani: " + text }] }]
      })
    });

    const data = await response.json();
    const reply = data.candidates[0].content.parts[0].text;
    addMessage('bot', reply);
  } catch (err) {
    addMessage('bot', '⚠️ Maaf, ada masalah koneksi. Pastikan API Key sudah benar.');
  }
  isLoading = false;
} // <-- Kurung ini sangat penting untuk menutup fungsi sendMessage
</script>
</body>
</html>
