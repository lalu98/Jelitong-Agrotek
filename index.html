<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jelitong Agrotek</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --earth: #3d2b1f; --soil: #6b4226; --leaf: #2d6a2d; --leaf-light: #4a9e4a;
    --sprout: #7bc67b; --sun: #e8a735; --cream: #f9f3e8; --shadow: rgba(61,43,31,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); min-height: 100vh; display: flex; flex-direction: column; }
  .header { background: linear-gradient(135deg, var(--earth) 0%, var(--leaf) 60%); padding: 20px; color: white; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
  .chat-wrapper { flex: 1; max-width: 780px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; padding: 16px; overflow-y: auto; }
  .chat-messages { flex: 1; display: flex; flex-direction: column; gap: 16px; margin-bottom: 20px; }
  .msg { display: flex; gap: 10px; margin-bottom: 10px; }
  .msg.user { flex-direction: row-reverse; }
  .msg-bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; }
  .msg.bot .msg-bubble { background: white; border: 1px solid #ddd; border-bottom-left-radius: 4px; }
  .msg.user .msg-bubble { background: var(--leaf); color: white; border-bottom-right-radius: 4px; }
  .input-area { background: white; padding: 16px; border-top: 1px solid #ddd; }
  .input-inner { max-width: 780px; margin: 0 auto; display: flex; gap: 10px; }
  textarea { flex: 1; border: 1.5px solid #ddd; border-radius: 12px; padding: 12px; resize: none; outline: none; }
  .send-btn { width: 48px; height: 48px; background: var(--leaf); border: none; border-radius: 50%; color: white; cursor: pointer; font-size: 20px; }
</style>
</head>
<body>

<div class="header">
  <h1>🌱 Jelitong Agrotek</h1>
  <p>Asisten Digital Pertanian Lombok & NTB</p>
</div>

<div class="chat-wrapper">
  <div class="chat-messages" id="chatMessages">
    <div class="msg bot">
      <div class="msg-bubble">Halo! Saya Jelitong. Ada yang bisa saya bantu soal pertanian hari ini?</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-inner">
    <textarea id="userInput" placeholder="Tanya soal tanaman..." rows="1"></textarea>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const API_KEY = "AIzaSyChNtgJ8fDzH_WGH1m1vCHGayyPys9RUjs";
const SYSTEM_PROMPT = "Anda adalah Jelitong Agrotek, ahli pertanian di NTB. Berikan jawaban praktis dan singkat untuk petani.";

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  addMessage('user', text);
  
  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: SYSTEM_PROMPT + "\n\nPertanyaan: " + text }] }]
      })
    });

    const data = await response.json();
    if (data.candidates && data.candidates[0].content.parts[0].text) {
      addMessage('bot', data.candidates[0].content.parts[0].text);
    } else {
      addMessage('bot', "⚠️ Maaf, coba lagi sebentar lagi.");
    }
  } catch (err) {
    addMessage('bot', "⚠️ Koneksi bermasalah.");
  }
}

function addMessage(role, text) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<div class="msg-bubble">${text.replace(/\n/g, '<br>')}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}
</script>
</body>
</html>
